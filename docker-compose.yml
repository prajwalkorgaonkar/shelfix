version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shelfix-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: shelfix
    volumes:
      - mongodb_data:/data/db

  api:
    build: .
    container_name: shelfix-api
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/shelfix
      JWT_SECRET: your-secret-key
      NODE_ENV: development
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
